tag_prefix = "v"
from_latest_tag = true
ignore_merge_commits = true
ignore_fixup_commits = true
disable_changelog = false
disable_bump_commit = false
generate_mono_repository_global_tag = true
generate_mono_repository_package_tags = true
branch_whitelist = ["main"]
skip_ci = "[skip ci]"
skip_untracked = true
pre_bump_hooks = []
post_bump_hooks = ["git push origin {{version_tag}}"]
pre_package_bump_hooks = []
post_package_bump_hooks = []

[git_hooks]

[commit_types]
# Technical changelog different from release notes
chore = { changelog_title = "", omit_from_changelog = true }
refactor = { changelog_title = "", omit_from_changelog = true }
docs = { changelog_title = "", omit_from_changelog = true }


[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
repository = "ScaffoldTemplate"
owner = "ScaffoldOwner"

[bump_profiles]
