extends:
  - spectral:oas

rules:
  # ----- Operation conventions -----
  operation-description: warn
  operation-tags: warn
  operation-tag-defined: warn
  operation-singular-tag: off
  operation-parameters: error
  operation-success-response: error

  # ----- Info block -----
  info-contact: warn
  info-description: warn
  info-license: off

  # ----- Tagging -----
  openapi-tags: warn
  openapi-tags-alphabetical: off
  openapi-tags-uniqueness: error
  tag-description: warn

  # ----- Path conventions -----
  path-declarations-must-exist: error
  path-keys-no-trailing-slash: error
  path-not-include-query: error
  path-params: error

  # ----- Schema conventions -----
  typed-enum: error
  duplicated-entry-in-enum: error
  array-items: warn

  # ----- OAS3-specific -----
  oas3-api-servers: warn
  oas3-parameter-description: warn
  oas3-schema: error
  oas3-unused-component: warn
  oas3-server-trailing-slash: error
  oas3-server-variables: error
  oas3-operation-security-defined: error
  oas3-valid-media-example: warn
  oas3-valid-schema-example: warn

  # ----- Security -----
  no-eval-in-markdown: error
  no-script-tags-in-markdown: error

  # ----- Contact -----
  contact-properties: off
  license-url: off

  # ----- Custom: operationId must use camelCase -----
  operation-operationId-casing:
    description: OperationId must use camelCase.
    message: "OperationId '{{value}}' should be camelCase."
    severity: warn
    given: "$.paths.*.*.operationId"
    then:
      function: pattern
      functionOptions:
        match: "^[a-z][a-zA-Z0-9]*$"

  # ----- Custom: request bodies must have a content type -----
  request-body-must-have-content:
    description: Request body must have at least one content type defined.
    message: Request body is defined without a content type.
    severity: error
    given: "$.paths.*.*.requestBody"
    then:
      field: content
      function: truthy

  # ----- Custom: require description on all parameters -----
  parameter-description:
    description: All parameters should have a description.
    message: Parameter is missing a description.
    severity: warn
    given: "$.paths.*.*.parameters[*]"
    then:
      field: description
      function: truthy

  # ----- Custom: successful responses should define a schema -----
  response-success-must-have-schema:
    description: Successful responses should define a schema.
    severity: warn
    given: "$.paths.*.*.responses.2*.content.*"
    then:
      field: schema
      function: truthy

  # ----- Custom: error responses should define a schema -----
  error-response-schema:
    description: Error responses should include a schema for the error payload.
    severity: warn
    given: "$.paths.*.*.responses.4*.content.*"
    then:
      field: schema
      function: truthy
