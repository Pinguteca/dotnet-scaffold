name: Feature Request
description: Suggest an idea for ScaffoldProjectName
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the feature below.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What use case does it enable?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you considered and why they were rejected

  - type: textarea
    id: context
    attributes:
      label: Additional Context
