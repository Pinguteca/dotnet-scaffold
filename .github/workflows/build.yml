name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  CI: "true"
  MISE_ENV: ci
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
#if (harden-runner)
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo-and-containers: "true"
#endif
      - name: Optimize Git config for CI
        run: |
          # Disable compression for faster network transfer.
          git config --global core.compression 0
          # Turn off fsync
          git config --global core.fsync -all

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          filter: "blob:none"

      - name: Install mise and tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true

      - name: Restore (locked mode)
        run: mise run ci:restore

      - name: Verify code formatting
        run: mise run format:check

      - name: Build (Release)
        run: mise run ci:build
      # Test step intentionally absent: this is a scaffold (template),
      # so it ships no test projects of its own. Consumers add their
      # own test projects after running `dotnet new` and wire the
      # equivalent step then. Re-add Test + Upload steps as the scaffold
      # itself grows mocked-behaviour tests.
