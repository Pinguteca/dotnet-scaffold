name: Secret Scanning & Revocation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  kingfisher:
    name: Secret Detection & Validation
    runs-on: ubuntu-latest
    steps:
      #if (harden-runner)
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo: "true" # runs on container so same issue as zizmor
      #endif
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true

      - name: Scan for secrets
        run: mise run secret:scan

      - name: Validate and revoke live secrets
        if: failure()
        run: mise run secret:validate

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kingfisher-results
          path: kingfisher-results.json
          retention-days: 30
