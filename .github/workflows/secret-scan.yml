name: Secret Scanning & Revocation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  kingfisher:
    name: Secret Detection & Validation
    runs-on: ubuntu-latest
    steps:
      #if (harden-runner)
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
          disable-telemetry: "true"
          disable-sudo: "true" # runs on container so same issue as zizmor
      #endif
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@13e47a3e36ebb42ca765e86e9dbaff3cb21464b4 # v2.2.3
        with:
          experimental: true

      - name: Scan for secrets
        run: mise run secret:scan

      - name: Validate and revoke live secrets
        if: failure()
        run: mise run secret:validate

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: kingfisher-results
          path: kingfisher-results.json
          retention-days: 30
