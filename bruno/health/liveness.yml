info:
  name: Liveness probe
  type: http
  seq: 1
  tags:
    - smoke

http:
  method: GET
  url: "{{api_url}}/health/live"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
