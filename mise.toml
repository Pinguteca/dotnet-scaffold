[settings]
experimental = true
# Caching
env_cache = true
env_cache_ttl = "9h"
# Tools
install_before = "7d"
pin = true                      # not really needed when using lockfiles (helps Renovate), can remove this and stick with latest and install_before setting
lockfile = true
locked = false
prefer_offline = true
disable_default_registry = true
disable_backends = ["asdf", "vfox", "ubi"]
npm.package_manager = "pnpm"

[tasks."aspire:deploy"]
run = "aspire deploy"
alias = "apd"

[tasks.build]
run = "dotnet build ScaffoldProjectName.slnx"
alias = "b"
description = "Build all projects"
sources = [
    "src/**/*.cs",
    "src/**/*.csproj",
    "ScaffoldProjectName.slnx",
    "Directory.Build.props",
    "Directory.Build.targets",
    "Directory.Packages.props",
    "global.json",
]
outputs = ["src/**/bin/**/*", "src/**/obj/**/*"]

[tasks.clean]
run = "dotnet clean ScaffoldProjectName.slnx"
alias = "cl"
description = "Clean build artifacts"

[tasks.restore]
run = "dotnet restore ScaffoldProjectName.slnx"
alias = "r"
description = "Restore NuGet packages"
sources = [
    "src/**/*.csproj",
    "src/**/packages.lock.json",
    "ScaffoldProjectName.slnx",
    "Directory.Packages.props",
    "global.json",
    "nuget.config",
]
outputs = ["src/**/obj/project.assets.json"]

[tasks.format]
run = "dotnet format ScaffoldProjectName.slnx"
alias = "fmt"
description = "Format code using .editorconfig rules"

[tasks."format:check"]
run = "dotnet format ScaffoldProjectName.slnx --verify-no-changes"
alias = "fmtc"
description = "Check code formatting without changes"

[tasks.dev]
run = "dotnet run --project src/ScaffoldProjectName.AppHost/ScaffoldProjectName.AppHost.csproj"
alias = "d"
description = "Start Aspire AppHost (local development)"

[tasks."release:sbom"]
run = "dotnet tool run CycloneDX ScaffoldProjectName.slnx -o out/sbom -f json"
alias = "rsbom"
description = "Generate SBOM in CycloneDX format"
sources = [
    "src/**/*.csproj",
    "src/**/packages.lock.json",
    "ScaffoldProjectName.slnx",
    "Directory.Packages.props",
]
outputs = ["out/sbom/**/*"]

[tasks."secret:scan"]
run = "kingfisher scan . --no-validate --redact --format json --output kingfisher-results.json"
alias = "ss"
description = "Scan for secrets in codebase"

[tasks."secret:validate"]
run = "kingfisher scan . --redact --validation-rps 2"
alias = "sv"
description = "Scan and validate live secrets for revocation"


[tasks."secrets:sync"]
run = "fnox sync --provider keychain"
alias = "ss-sync"
description = "Sync secrets from remote provider to OS Keychain (local dev cache)"

[tasks."secrets:sync-dry"]
run = "fnox sync --provider keychain --dry-run"
alias = "ss-dry"
description = "Preview which secrets would sync to OS Keychain"

[tasks."secrets:refresh"]
run = "fnox sync --provider keychain --force"
alias = "ss-refresh"
description = "Force refresh all cached secrets in OS Keychain from remote"

[tasks."secrets:list"]
run = "fnox list"
alias = "ss-ls"
description = "List all resolved secrets for the current profile"

[tasks."proto:lint"]
run = "buf lint"
alias = "pl"
description = "Lint proto files with buf"

[tasks."proto:format"]
run = "buf format --write"
alias = "pf"
description = "Format proto files in place"

[tasks."proto:format-check"]
run = "buf format --diff --exit-code"
alias = "pfc"
description = "Check proto formatting without modifying files"

[tasks."proto:breaking"]
# CI's actions/checkout (even with fetch-depth: 0) fetches history
# but not other-branch refs. Materialise main locally if missing
# before buf reads .git#branch=main.
run = "git show-ref --verify --quiet refs/heads/main || git fetch origin main:main --no-tags --depth=1 ; buf breaking --against .git#branch=main"
alias = "pb"
description = "Detect breaking proto changes vs main branch"

[tasks."proto:generate"]
run = "buf generate"
alias = "pg"
description = "Generate code from proto files via buf.gen.yaml"
sources = ["proto/**/*.proto", "buf.yaml", "buf.gen.yaml"]
outputs = ["out/sdk/**/*"]

[tasks."loadtest:smoke"]
run = "k6 run k6/smoke.js"
alias = "lts"
description = "Run the one-shot k6 smoke test against /health/live"

[tasks."loadtest:load"]
run = "k6 run k6/echo.js"
alias = "ltl"
description = "Run the sustained k6 load profile against EchoService.Echo"

[tasks."loadtest:stress"]
run = "k6 run k6/stress.js"
alias = "ltr"
description = "Run the k6 stress ramp until the service saturates"

[tools]
"github:mongodb/kingfisher" = "1.98.0"
"dotnet:aspire.cli" = "13.3.0"
fnox = "1.23.0"
k6 = "1.7.1"
pinact = "3.9.2"
rtk = "0.38.0"
pnpm = "11.0.2"
dotnet = "10.0.203"
node = "25.9.0"
buf = "1.69.0"

[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[env]
_.fnox-env = { tools = true }
