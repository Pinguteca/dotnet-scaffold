[settings]
experimental = true
# Caching
env_cache = true
env_cache_ttl = "9h"
# Tools
install_before = "7d"
pin = true                      # not really needed when using lockfiles (helps Renovate), can remove this and stick with latest and install_before setting
lockfile = true
locked = false
prefer_offline = true
disable_default_registry = true
disable_backends = ["asdf", "vfox", "ubi"]
npm.package_manager = "pnpm"

[tasks."aspire:deploy"]
run = "aspire deploy"
alias = "apd"

[tasks.build]
run = "dotnet build ScaffoldProjectName.slnx"
alias = "b"
description = "Build all projects"

[tasks.clean]
run = "dotnet clean ScaffoldProjectName.slnx"
alias = "cl"
description = "Clean build artifacts"

[tasks.restore]
run = "dotnet restore ScaffoldProjectName.slnx"
alias = "r"
description = "Restore NuGet packages"

[tasks.format]
run = "dotnet format ScaffoldProjectName.slnx"
alias = "fmt"
description = "Format code using .editorconfig rules"

[tasks."format:check"]
run = "dotnet format ScaffoldProjectName.slnx --verify-no-changes"
alias = "fmtc"
description = "Check code formatting without changes"

[tasks.dev]
run = "dotnet run --project src/ScaffoldProjectName.AppHost/ScaffoldProjectName.AppHost.csproj"
alias = "d"
description = "Start Aspire AppHost (local development)"

[tasks."release:sbom"]
run = "dotnet tool run CycloneDX ScaffoldProjectName.slnx -o out/sbom -f json"
alias = "rsbom"
description = "Generate SBOM in CycloneDX format"

[tasks."secret:scan"]
run = "kingfisher scan . --format json --output kingfisher-results.json"
alias = "ss"
description = "Scan for secrets in codebase"

[tasks."secret:validate"]
run = "kingfisher scan . --validate --validation-rps 2"
alias = "sv"
description = "Scan and validate live secrets for revocation"


[tasks."secrets:sync"]
run = "fnox sync --provider keychain"
alias = "ss-sync"
description = "Sync secrets from remote provider to OS Keychain (local dev cache)"

[tasks."secrets:sync-dry"]
run = "fnox sync --provider keychain --dry-run"
alias = "ss-dry"
description = "Preview which secrets would sync to OS Keychain"

[tasks."secrets:refresh"]
run = "fnox sync --provider keychain --force"
alias = "ss-refresh"
description = "Force refresh all cached secrets in OS Keychain from remote"

[tasks."secrets:list"]
run = "fnox list"
alias = "ss-ls"
description = "List all resolved secrets for the current profile"

[tools]
"github:mongodb/kingfisher" = "1.95.0"
"github:oasdiff/oasdiff" = "1.14.0"
"dotnet:aspire.cli" = "13.2.2"
fnox = "1.20.0"
java = "21.0.2"
"npm:@openapitools/openapi-generator-cli" = "2.31.1"
pinact = "3.9.0"
rtk = "0.33.1"
spectral = "6.15.0"
pnpm = "10.33.0"
dotnet = "10.0.202"
node = "25.9.0"

[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[env]
_.fnox-env = { tools = true }
