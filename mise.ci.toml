[settings]
experimental = true
# Caching
env_cache = true
env_cache_ttl = "9h"
# Tools
install_before = "7d"
pin = true                      # not really needed when using lockfiles (helps Renovate), can remove this and stick with latest and install_before setting
lockfile = true
locked = false
prefer_offline = true
disable_default_registry = true
disable_backends = ["asdf", "vfox", "ubi"]

[tasks."ci:git-config"]
run = """
git config --global core.compression 0
git config --global core.fsync -all
"""
description = "Optimize Git config for CI (disable compression, fsync)"

[tasks."ci:restore"]
run = "dotnet restore ScaffoldProjectName.slnx --locked-mode"
description = "Restore NuGet packages in locked mode (verifies lockfiles match)"
sources = [
    "src/**/*.csproj",
    "src/**/packages.lock.json",
    "ScaffoldProjectName.slnx",
    "Directory.Packages.props",
    "global.json",
    "nuget.config",
]
outputs = ["src/**/obj/project.assets.json"]

[tasks."ci:build"]
run = "dotnet build ScaffoldProjectName.slnx --configuration Release --no-restore"
description = "Build solution in Release configuration without restoring"
sources = [
    "src/**/*.cs",
    "src/**/*.csproj",
    "ScaffoldProjectName.slnx",
    "Directory.Build.props",
    "Directory.Build.targets",
    "Directory.Packages.props",
    "global.json",
]
outputs = ["src/**/bin/Release/**/*"]


[tasks."ci:proto:lint"]
run = "buf lint --error-format github-actions"
description = "Lint proto files with GitHub Actions annotations"

[tasks."ci:proto:format-check"]
run = "buf format --diff --exit-code"
description = "Verify proto formatting (CI)"

[tasks."ci:proto:generate"]
run = "buf generate"
description = "Generate code from proto in CI"
sources = ["proto/**/*.proto", "buf.yaml", "buf.gen.yaml"]
outputs = ["out/sdk/**/*"]
