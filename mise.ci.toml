[settings]
experimental = false
# Caching
env_cache = true
env_cache_ttl = "9h"
# Tools
install_before = "7d"
pin = true                      # not really needed when using lockfiles (helps Renovate), can remove this and stick with latest and install_before setting
lockfile = true
locked = false
prefer_offline = true
disable_default_registry = true
disable_backends = ["asdf", "vfox", "ubi"]

[tasks."ci:git-config"]
run = """
git config --global core.compression 0
git config --global core.fsync -all
"""
description = "Optimize Git config for CI (disable compression, fsync)"

[tasks."ci:restore"]
run = "dotnet restore ScaffoldProjectName.slnx --locked-mode"
description = "Restore NuGet packages in locked mode (verifies lockfiles match)"

[tasks."ci:build"]
run = "dotnet build ScaffoldProjectName.slnx --configuration Release --no-restore"
description = "Build solution in Release configuration without restoring"

[tasks."ci:test"]
run = """
if ls tests/*.csproj >/dev/null 2>&1 || ls test/*.csproj >/dev/null 2>&1; then
  dotnet test ScaffoldProjectName.slnx --configuration Release --no-build \
    --logger "trx;LogFileName=test-results.trx" \
    --collect:"XPlat Code Coverage"
else
  echo "No test projects found, skipping tests"
fi
"""
description = "Run tests in Release with TRX logger and XPlat coverage"

[tasks."ci:openapi:lint"]
run = "spectral lint out/openapi/ScaffoldProjectName.ApiService.json --ruleset .spectral.yml --format github-actions"
description = "Lint OpenAPI spec with GitHub Actions annotations"

[tasks."ci:openapi:breaking"]
run = """
if [ -f openapi-baseline.json ]; then
  oasdiff breaking openapi-baseline.json out/openapi/ScaffoldProjectName.ApiService.json \
    --fail-on ERR --format githubactions
else
  echo "::warning::No OpenAPI baseline committed - skipping breaking change detection"
fi
"""
description = "Fail CI if there are breaking OpenAPI changes vs baseline"

[tasks."ci:sdk:gen:all"]
depends = [
  "sdk:gen:java",
  "sdk:gen:kotlin",
  "sdk:gen:go",
  "sdk:gen:rust",
  "sdk:gen:python",
  "sdk:gen:typescript",
  "sdk:gen:csharp",
  "sdk:gen:dart"
]
description = "Generate all client SDKs in CI (fails fast on any generator error)"
